app-id: org.flycast.Flycast
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: flycast
rename-desktop-file: flycast.desktop
rename-icon: flycast
finish-args:
  - --device=all
  - --filesystem=host:ro
  - --share=network
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc

modules:
  - name: flycast
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DUSE_HOST_GLSLANG=TRUE
      - -DUSE_HOST_SDL=TRUE
    cleanup:
      - /include
      - /share/man
      - /share/pixmaps
      - '*.a'
    post-install:
      - sed -i 's|<release .* />|<release date="'$(git show -s --format=%cs)'" version="'$(git
        describe --tags)'" />"|' ${FLATPAK_DEST}/share/metainfo/org.flycast.Flycast.metainfo.xml
    sources:
      - type: git
        url: https://github.com/flyinghead/flycast.git
        tag: v2.6
        commit: 392a429e8b040b3e5bf6696cb4f984274fc44123
        x-checker-data:
          type: git
